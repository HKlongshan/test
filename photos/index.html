<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>僑港順德龍山同鄉會 - 活動影集</title>
    <style>
        :root {
            --primary-color: #b30000; /* 喜慶紅 */
            --bg-color: #f4f7f6;
            --text-color: #333;
        }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--text-color);
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            padding: 40px 0;
        }
        h1 { color: var(--primary-color); margin-bottom: 10px; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            text-align: center;
        }
        .card:hover { transform: translateY(-10px); }
        .card h3 { margin: 15px 0; font-size: 1.1em; color: #444; }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            margin-top: 10px;
        }
        .btn:hover { background-color: #8b0000; }
        footer { text-align: center; margin-top: 50px; color: #888; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>僑港順德龍山同鄉會</h1>
        <p>活動精選影集</p>
    </header>

    <div class="gallery">
        <!-- 卡片 1 -->
        <div class="card">
            <h3>20263月14日第三屆花炮會 (視頻)</h3>
            <a href="https://photos.app.goo.gl/NFRuYSRvD47U7Bws9" class="btn" target="_blank">立即觀看</a>
        </div>
        <!-- 卡片 2 -->
        <div class="card">
            <h3>20263月14日第三屆花炮會 (照片)</h3>
            <a href="https://photos.app.goo.gl/eFJc3LX8sPdSU2vw5" class="btn" target="_blank">立即觀看</a>
        </div>
        <!-- 卡片 3 -->
        <div class="card">
            <h3>20263月14日第三屆花炮會 (私人拍攝)</h3>
            <a href="https://photos.app.goo.gl/3ZtHxVmGSEEyTM346" class="btn" target="_blank">立即觀看</a>
        </div>
        <!-- 卡片 4 -->
        <div class="card">
            <h3>2026年3月8日 年新春茶聚</h3>

    </div>

    <footer>
        <p>更新日期：2026年3月 | 僑港順德龍山同鄉會秘書處</p>
        <p>© 版權所有 2026 橋港順德龍山同鄉會</p>
    </footer>
</div>

</body>
</html>
